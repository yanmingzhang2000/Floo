<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- 身体 - 金色 -->
  <ellipse cx="60" cy="75" rx="25" ry="20" fill="#FFF8E1" stroke="#FFD54F" stroke-width="2"/>
  <!-- 头 -->
  <circle cx="60" cy="45" r="28" fill="#FFF8E1" stroke="#FFD54F" stroke-width="2"/>
  <!-- 左耳 -->
  <polygon points="38,25 48,5 58,25" fill="#FFF8E1" stroke="#FFD54F" stroke-width="2"/>
  <polygon points="42,22 48,10 54,22" fill="#FFB6C1"/>
  <!-- 右耳 -->
  <polygon points="62,25 72,5 82,25" fill="#FFF8E1" stroke="#FFD54F" stroke-width="2"/>
  <polygon points="66,22 72,10 78,22" fill="#FFB6C1"/>
  <!-- 眼睛 - 金色星星眼 -->
  <polygon points="50,42 51,38 52,42 56,42 53,44 54,48 50,45 46,48 47,44 44,42" fill="#FFD700"/>
  <polygon points="70,42 71,38 72,42 76,42 73,44 74,48 70,45 66,48 67,44 64,42" fill="#FFD700"/>
  <!-- 鼻子 -->
  <ellipse cx="60" cy="50" rx="2" ry="1.5" fill="#FFB6C1"/>
  <!-- 嘴巴 - 神秘微笑 -->
  <path d="M55,53 Q60,57 65,53" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- 胡须 - 金色 -->
  <line x1="35" y1="48" x2="48" y2="50" stroke="#FFD54F" stroke-width="1.5"/>
  <line x1="35" y1="52" x2="48" y2="52" stroke="#FFD54F" stroke-width="1.5"/>
  <line x1="72" y1="50" x2="85" y2="48" stroke="#FFD54F" stroke-width="1.5"/>
  <line x1="72" y1="52" x2="85" y2="52" stroke="#FFD54F" stroke-width="1.5"/>
  <!-- 光环 -->
  <ellipse cx="60" cy="12" rx="18" ry="5" fill="none" stroke="#FFD700" stroke-width="2.5"/>
  <!-- 皇冠 -->
  <path d="M48,18 L52,10 L56,16 L60,8 L64,16 L68,10 L72,18" fill="#FFD700" stroke="#FFA500" stroke-width="1.5"/>
  <rect x="48" y="18" width="24" height="4" fill="#FFD700" stroke="#FFA500" stroke-width="1"/>
  <!-- 宝石装饰 -->
  <circle cx="60" cy="20" r="2" fill="#E91E63"/>
  <circle cx="54" cy="20" r="1.5" fill="#2196F3"/>
  <circle cx="66" cy="20" r="1.5" fill="#4CAF50"/>
  <!-- 翅膀 -->
  <path d="M35,60 Q25,50 30,40 Q35,50 35,60" fill="#FFD700" stroke="#FFA500" stroke-width="1"/>
  <path d="M85,60 Q95,50 90,40 Q85,50 85,60" fill="#FFD700" stroke="#FFA500" stroke-width="1"/>
  <!-- 尾巴 - 金色 -->
  <path d="M85,75 Q95,65 90,50" fill="none" stroke="#FFD54F" stroke-width="4" stroke-linecap="round"/>
</svg>