<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- 身体 -->
  <ellipse cx="60" cy="75" rx="25" ry="20" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="2"/>
  <!-- 头 -->
  <circle cx="60" cy="45" r="28" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="2"/>
  <!-- 左耳 -->
  <polygon points="38,25 48,5 58,25" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="2"/>
  <polygon points="42,22 48,10 54,22" fill="#FFB6C1"/>
  <!-- 右耳 -->
  <polygon points="62,25 72,5 82,25" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="2"/>
  <polygon points="66,22 72,10 78,22" fill="#FFB6C1"/>
  <!-- 眼睛 -->
  <circle cx="50" cy="42" r="3" fill="#333"/>
  <circle cx="70" cy="42" r="3" fill="#333"/>
  <!-- 鼻子 -->
  <ellipse cx="60" cy="50" rx="2" ry="1.5" fill="#FFB6C1"/>
  <!-- 嘴巴 - 勇敢的笑 -->
  <path d="M52,53 Q60,60 68,53" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- 胡须 -->
  <line x1="35" y1="48" x2="48" y2="50" stroke="#CCC" stroke-width="1"/>
  <line x1="35" y1="52" x2="48" y2="52" stroke="#CCC" stroke-width="1"/>
  <line x1="72" y1="50" x2="85" y2="48" stroke="#CCC" stroke-width="1"/>
  <line x1="72" y1="52" x2="85" y2="52" stroke="#CCC" stroke-width="1"/>
  <!-- 盾牌 -->
  <path d="M85,35 L95,35 L95,50 L90,55 L85,50 Z" fill="#FF6B6B" stroke="#E55555" stroke-width="1.5"/>
  <text x="90" y="48" text-anchor="middle" font-size="10" fill="white" font-weight="bold">C</text>
  <!-- 尾巴 -->
  <path d="M85,75 Q95,65 90,50" fill="none" stroke="#E0E0E0" stroke-width="4" stroke-linecap="round"/>
</svg>